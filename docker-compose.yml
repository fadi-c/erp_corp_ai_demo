
services:

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    ports:
      - "5432:5432"
    networks:
      - erp_corp_net

  redis:
    image: redis:7
    networks:
      - erp_corp_net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - erp_corp_net

  worker:
    command: python /app/workers/entrypoint.py
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    networks:
      - erp_corp_net
    ports:
      - "5555:5555" 

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    command: python /app/workers/beat_entrypoint.py
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    networks:
      - erp_corp_net
    ports:
      - "5556:5556"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - erp_corp_net

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - erp_corp_net
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}

  embedding:
    build:
      context: .
      dockerfile: local_embedding/Dockerfile
    ports:
      - "5000:5000"
    networks:
      - erp_corp_net

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    volumes:
      - ./frontend:/app 
      - ./.node_modules:/home/node/.node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL="http://localhost:8000/api"
      - VITE_GRAFANA_URL="http://localhost:3000/"
      - VITE_GITHUB_URL="https://github.com"
    command: npm run dev -- --host
    networks:
      - erp_corp_net

networks:
  erp_corp_net:
    driver: bridge